info:
  name: PATCH /api/enduser/:EndUserID
  type: http
  seq: 1

http:
  method: PATCH
  url: "{{baseURL}}/api/enduser/{{EndUserID}}"
  body:
    type: json
    data: |-
      {
        "EndUserName": "{{process.env.END_USER_NAME}}{{process.env.UPDATE_SUFFIX}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
