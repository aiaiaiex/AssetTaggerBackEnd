info:
  name: PATCH /api/enduser/:EndUserID
  type: http
  seq: 1

http:
  method: PATCH
  url: "{{baseURL}}/api/enduser/{{temporaryEndUserID}}"
  body:
    type: json
    data: ""
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        bru.setVar("updatedTemporaryEndUserEndUserRoleID", bru.getProcessEnv("UPDATED_TEMPORARY_END_USER_END_USER_ROLE_ID") || bru.getVar("temporaryEndUserEndUserRoleID"));
        bru.setVar("updatedTemporaryEndUserEmployeeID", bru.getProcessEnv("UPDATED_TEMPORARY_END_USER_EMPLOYEE_ID") || bru.getVar("temporaryEndUserEmployeeID"));

        req.setBody({
          EndUserName: bru.getProcessEnv("UPDATED_TEMPORARY_END_USER_NAME") || bru.getProcessEnv("TEMPORARY_END_USER_NAME"),
          EndUserRoleID: bru.getVar("updatedTemporaryEndUserEndUserRoleID"),
          EmployeeID: bru.getVar("updatedTemporaryEndUserEmployeeID")
        });
  assertions:
    - expression: res.body.EndUserID
      operator: eq
      value: "{{temporaryEndUserID}}"
    - expression: res.body.EndUserName
      operator: eq
      value: "{{process.env.UPDATED_TEMPORARY_END_USER_NAME}}"
    - expression: res.body.EndUserRoleID
      operator: eq
      value: "{{updatedTemporaryEndUserEndUserRoleID}}"
    - expression: res.body.EmployeeID
      operator: eq
      value: "{{updatedTemporaryEndUserEmployeeID}}"
    - expression: res.body.OldEndUserName
      operator: eq
      value: "{{process.env.TEMPORARY_END_USER_NAME}}"
    - expression: res.body.OldEndUserRoleID
      operator: eq
      value: "{{temporaryEndUserEndUserRoleID}}"
    - expression: res.body.OldEmployeeID
      operator: eq
      value: "{{temporaryEndUserEmployeeID}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
