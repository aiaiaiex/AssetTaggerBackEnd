info:
  name: POST /api/enduser
  type: http
  seq: 8

http:
  method: POST
  url: "{{baseURL}}/api/enduser"
  body:
    type: json
    data: |-
      {
        "EndUserName": "{{process.env.END_USER_NAME}}",
        "EndUserPassword": "{{process.env.END_USER_PASSWORD}}",
        "EndUserRoleID": "{{EndUserRoleID}}",
        "EmployeeID": "{{EmployeeID}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setVar("EndUserID", res("EndUserID"));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
