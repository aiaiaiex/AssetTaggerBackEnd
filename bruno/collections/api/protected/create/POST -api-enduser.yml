  type: http
  seq: 11

http:
  method: POST
  url: "{{baseURL}}/api/enduser"
  body:
    type: json
    data: |-
      {
        "EndUserName": "TemporaryEndUserName",
        "EndUserPassword": "TemporaryEndUserPassword",
        "EndUserRoleID": "{{EndUserRoleID}}",
        "EmployeeID": "{{EmployeeID}}"
