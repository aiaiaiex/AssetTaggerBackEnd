info:
  name: POST /api/manufacturer
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseURL}}/api/manufacturer"
  body:
    type: json
    data: |-
      {
        "ManufacturerName": "TemporaryManufacturerName"
      }
  auth: inherit

runtime:
  scripts:
