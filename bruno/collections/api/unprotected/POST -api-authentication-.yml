info:
  name: POST /api/authentication/
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseURL}}/api/authentication/"
  body:
    type: json
    data: |-
      {
        "EndUserName": "{{process.env.ADMIN_END_USER_NAME}}",
        "EndUserPassword": "{{process.env.ADMIN_END_USER_PASSWORD}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
